# wrangler.toml — Cloudflare Worker config for the Mere snippet-share.
#
# Deploy: `wrangler deploy` (needs wrangler CLI + `wrangler login`).
# Local dev: `wrangler dev` starts a local V8 isolate + emulated KV.

name = "mere-share"
main = "worker.js"
compatibility_date = "2026-07-05"

# KV namespace binding. Create with:
#   wrangler kv namespace create MERE_SNIPPETS
# then copy the returned `id` into the block below.
[[kv_namespaces]]
binding = "MERE_SNIPPETS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true
